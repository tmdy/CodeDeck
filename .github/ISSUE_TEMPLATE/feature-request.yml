name: Feature request
description: 提议一个具体的使用场景或改进
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 现在在哪一步遇到麻烦？请描述实际流程。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议做法
      description: 说明期望的行为，不必先设计内部实现。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 当前替代办法
      description: 如果已有临时解决方式，请写在这里。
  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      options:
        - label: 这个需求与 Claude Code、Codex 或 CodeDeck 的本地管理流程直接相关。
          required: true
