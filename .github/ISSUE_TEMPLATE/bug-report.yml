name: Bug report
description: 报告可以稳定复现的 CodeDeck 问题
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        请先删除 API Key、Token、Cookie、个人路径和会话内容。公开 Issue 不适合粘贴完整 `app-data`。
  - type: input
    id: version
    attributes:
      label: CodeDeck 版本或提交
      description: 例如 v0.2.0 或 git commit SHA
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows 版本
      placeholder: Windows 11 24H2 x64
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: 相关 CLI
      options:
        - Claude Code
        - Codex
        - 两者都有
        - 与 CLI 无关
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 实际发生了什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 选择……
        3. 看到……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 已脱敏的日志或截图
      description: 只附与问题直接相关的片段。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue，没有找到同一问题。
          required: true
        - label: 我已移除凭据、Cookie、个人路径和私人会话内容。
          required: true
